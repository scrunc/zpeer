# ZPeer backend config (TLS mandatory).
#
# This backend can attach to ONE or MANY zpeer proxies simultaneously.
# A single local Paper will appear on every proxy that accepts its token
# (the proxy decides the visible server name via its tokens map).

# ---- Preferred schema: a list of proxies --------------------------------
#
# Uncomment and fill in. Each entry needs its own cert_fingerprint + token,
# because each proxy generates its own self-signed cert.
#
# proxies:
#   - name: home              # any short label, used in log lines
#     host: 127.0.0.1
#     port: 25577
#     cert_fingerprint: "REPLACE_AT_DEPLOY_PROXY_FINGERPRINT"
#     token: "REPLACE_ME"
#
#   - name: remote
#     host: proxy.example.com
#     port: 25577
#     cert_fingerprint: "REPLACE_AT_DEPLOY_REMOTE_FINGERPRINT"
#     token: "REPLACE_ME_REMOTE"

# ---- Legacy schema (single proxy) — still supported ---------------------
#
# If `proxies:` above is absent, the old `proxy:` + top-level `token:` block
# below is used and treated as a single-entry list named "default".

proxy:
  host: proxy.example.com
  port: 25577

  # SHA-256 fingerprint of the proxy's TLS cert. The proxy logs this at
  # startup. Connection is refused if the cert doesn't match — MITM defense.
  cert_fingerprint: "REPLACE_AT_DEPLOY_PROXY_FINGERPRINT"

# Token this backend authenticates with. Must match an entry on the proxy's
# tokens map. Server name is assigned by the proxy via HELLO_OK.
token: "REPLACE_ME"

# The local Minecraft server address this plugin bridges to. Shared across
# all proxies (the same Paper appears on each).
local:
  host: 127.0.0.1
  port: 25565
